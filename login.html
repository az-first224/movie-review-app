<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品レビュー記録 - ログイン</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111715;
      color: #f2f4ef;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(215, 184, 95, 0.14), transparent 38%),
        #111715;
    }

    main {
      width: min(100%, 420px);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(32, 39, 37, 0.96);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.65rem;
    }

    p {
      margin: 0 0 24px;
      color: #aeb8b1;
      line-height: 1.6;
    }

    label, input, button { display: block; width: 100%; }
    label { font-weight: 700; }

    input {
      margin-top: 8px;
      padding: 13px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: inherit;
      background: #121916;
      font: inherit;
    }

    button {
      margin-top: 18px;
      padding: 13px 16px;
      border: 0;
      border-radius: 8px;
      background: #d7b85f;
      color: #171710;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #error {
      min-height: 1.5em;
      margin: 14px 0 0;
      color: #ffaaa3;
    }
  </style>
</head>
<body>
  <main>
    <h1>作品レビュー記録</h1>
    <p>閲覧するにはサイトパスワードを入力してください。</p>

    <form id="loginForm">
      <label>
        パスワード
        <input id="password" type="password" autocomplete="current-password" required autofocus>
      </label>
      <button id="submitButton" type="submit">ログイン</button>
      <p id="error" role="alert" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#loginForm");
    const passwordInput = document.querySelector("#password");
    const submitButton = document.querySelector("#submitButton");
    const errorMessage = document.querySelector("#error");

    function getNextPath() {
      const next = new URLSearchParams(location.search).get("next");
      return next && next.startsWith("/") && !next.startsWith("//") ? next : "/";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      submitButton.textContent = "確認中...";
      errorMessage.textContent = "";

      try {
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value })
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({}));
          throw new Error(result.error || "ログインに失敗しました。");
        }

        location.replace(getNextPath());
      } catch (error) {
        errorMessage.textContent = error.message;
        passwordInput.select();
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "ログイン";
      }
    });
  </script>
</body>
</html>
