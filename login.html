<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品レビュー記録 - ログイン</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Caslon+Display&family=Noto+Serif+JP:wght@400;600;700&display=swap");

    :root {
      color-scheme: light;
      font-family: "Noto Serif JP", Georgia, serif;
      background: #2a1210;
      color: #251712;
    }

    * { box-sizing: border-box; }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 36px 24px;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0, rgba(232, 196, 118, 0.22), transparent 38%),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.08) 0 34px, transparent 34px 68px),
        #2a1210;
    }

    main {
      position: relative;
      width: min(100%, 420px);
      padding: 46px 38px 38px;
      border: 8px solid #7d171b;
      outline: 3px solid #c4973f;
      background:
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(75, 40, 22, 0.025) 3px 4px),
        #f8edcf;
      box-shadow: 0 28px 75px rgba(0, 0, 0, 0.52);
      text-align: center;
    }

    main::before {
      position: absolute;
      inset: 10px;
      content: "";
      pointer-events: none;
      border: 1px dashed rgba(125, 23, 27, 0.36);
    }

    main::after {
      position: absolute;
      top: 16px;
      left: 50%;
      content: "THE GRAND PICTURE HOUSE";
      color: #7d171b;
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    h1 {
      position: relative;
      margin: 0 0 10px;
      color: #7d171b;
      font-family: "Libre Caslon Display", "Noto Serif JP", serif;
      font-size: 2rem;
      font-weight: 400;
    }

    p {
      position: relative;
      margin: 0 0 24px;
      color: #5d473c;
      line-height: 1.6;
    }

    label, input, button { display: block; width: 100%; }
    label {
      position: relative;
      color: #5d473c;
      font-size: 0.86rem;
      font-weight: 700;
      text-align: left;
    }

    input {
      margin-top: 8px;
      padding: 13px 14px;
      border: 1px solid #9d8256;
      border-radius: 0;
      color: inherit;
      background: rgba(255, 252, 235, 0.8);
      font: inherit;
    }

    button {
      position: relative;
      margin-top: 18px;
      padding: 13px 16px;
      border: 1px solid #541014;
      border-radius: 0;
      background: #7d171b;
      color: #f8edcf;
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: 3px 3px 0 #c4973f;
      cursor: pointer;
    }

    button:hover {
      background: #aa292a;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    #error {
      min-height: 1.5em;
      margin: 14px 0 0;
      color: #852025;
    }
  </style>
</head>
<body>
  <main>
    <h1>作品レビュー記録</h1>
    <p>閲覧するにはサイトパスワードを入力してください。</p>

    <form id="loginForm">
      <label>
        パスワード
        <input id="password" type="password" autocomplete="current-password" required autofocus>
      </label>
      <button id="submitButton" type="submit">ログイン</button>
      <p id="error" role="alert" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#loginForm");
    const passwordInput = document.querySelector("#password");
    const submitButton = document.querySelector("#submitButton");
    const errorMessage = document.querySelector("#error");

    function getNextPath() {
      const next = new URLSearchParams(location.search).get("next");
      return next && next.startsWith("/") && !next.startsWith("//") ? next : "/";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      submitButton.textContent = "確認中...";
      errorMessage.textContent = "";

      try {
        const response = await fetch("/api/auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value })
        });

        if (!response.ok) {
          const result = await response.json().catch(() => ({}));
          throw new Error(result.error || "ログインに失敗しました。");
        }

        location.replace(getNextPath());
      } catch (error) {
        errorMessage.textContent = error.message;
        passwordInput.select();
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "ログイン";
      }
    });
  </script>
</body>
</html>
